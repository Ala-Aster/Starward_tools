<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>星之翼 技データベース［編集］</title>
    <style>
        :root {
            --bg-color: #121212; --container-bg: #1e1e1e; --section-bg: #252525;
            --card-bg: #2a2a2a; --list-bg: #1a1a1a; --text-main: #ffffff;
            --text-sub: #aaa; --accent-color: #00ffcc; --border-color: #444;
            --accent-bg: rgba(0,255,204,0.1); --btn-text: #121212;
            --info-bg: rgba(0,255,204,0.08); --info-text: #00ffcc;
            --info-border: rgba(0,255,204,0.3); --success-bg: rgba(0,200,100,0.1);
            --danger-text: #ff5555; --export-bg: rgba(255,180,0,0.1);
            --export-text: #ffb400; --export-border: rgba(255,180,0,0.3);
            --edit-bg: rgba(0,255,204,0.05);
            --font-mono: 'Courier New', monospace;
            --font-sans: 'Helvetica Neue', Arial, sans-serif;
            --radius-md: 8px; --radius-lg: 12px;
        }
        [data-theme="light"] {
            --bg-color: #f5f5f7; --container-bg: #ffffff; --section-bg: #f0f0f2;
            --card-bg: #e8e8ec; --list-bg: #fafafa; --text-main: #1d1d1f;
            --text-sub: #555; --accent-color: #0066cc; --border-color: #ccc;
            --accent-bg: rgba(0,102,204,0.1); --btn-text: #ffffff;
            --info-bg: rgba(0,102,204,0.08); --info-text: #0066cc;
            --info-border: rgba(0,102,204,0.3); --success-bg: rgba(0,150,80,0.1);
            --danger-text: #cc0000; --export-bg: rgba(180,100,0,0.08);
            --export-text: #b46000; --export-border: rgba(180,100,0,0.3);
            --edit-bg: rgba(0,102,204,0.04);
        }
        [data-theme="custom"] {
            --bg-color: #fbf9f1; --container-bg: #f7f4e9; --section-bg: #eee9da;
            --card-bg: #dfd9c6; --list-bg: #fbf9f1; --text-main: #000;
            --text-sub: #444; --accent-color: #d35400; --border-color: #cca47e;
            --accent-bg: rgba(211,84,0,0.1); --btn-text: #ffffff;
            --info-bg: rgba(211,84,0,0.08); --info-text: #d35400;
            --info-border: rgba(211,84,0,0.3); --success-bg: rgba(100,150,0,0.1);
            --danger-text: #aa2200; --export-bg: rgba(150,100,0,0.08);
            --export-text: #996600; --export-border: rgba(150,100,0,0.3);
            --edit-bg: rgba(211,84,0,0.04);
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: var(--font-sans); background: var(--bg-color); color: var(--text-main); padding: 16px; transition: background 0.3s, color 0.3s; }
        .top-bar { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
        .top-bar-left { display: flex; align-items: center; gap: 8px; }
        .back-link { color: var(--accent-color); text-decoration: none; font-size: 13px; border: 1px solid var(--border-color); padding: 5px 12px; border-radius: 20px; transition: 0.2s; }
        .back-link:hover { border-color: var(--accent-color); }
        .page-title { font-size: 20px; font-weight: bold; color: var(--accent-color); }
        .edit-badge { font-size: 10px; font-weight: 700; padding: 2px 8px; background: var(--export-bg); color: var(--export-text); border: 1px solid var(--export-border); border-radius: 99px; }
        .top-bar-right { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
        .theme-switcher { display: flex; gap: 5px; }
        .btn-theme { background: var(--section-bg); color: var(--text-main); border: 1px solid var(--border-color); padding: 5px 12px; font-size: 12px; border-radius: 20px; cursor: pointer; transition: 0.2s; font-family: var(--font-sans); }
        .btn-theme:hover, .btn-theme.active { border-color: var(--accent-color); color: var(--accent-color); }
        .export-bar { background: var(--export-bg); border: 1px solid var(--export-border); border-radius: var(--radius-lg); padding: 10px 16px; margin-bottom: 16px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
        .export-bar-text { font-size: 13px; color: var(--export-text); }
        .export-bar-actions { display: flex; gap: 8px; }
        .btn-export { padding: 6px 18px; font-size: 13px; font-weight: 700; background: var(--export-text); color: #fff; border: none; border-radius: 8px; cursor: pointer; font-family: var(--font-sans); transition: 0.15s; }
        .btn-export:hover { opacity: 0.85; }
        .btn-import { padding: 6px 14px; font-size: 13px; font-weight: 600; background: none; color: var(--export-text); border: 1px solid var(--export-border); border-radius: 8px; cursor: pointer; font-family: var(--font-sans); transition: 0.15s; }
        .btn-import:hover { background: var(--export-bg); }
        .layout { display: grid; grid-template-columns: 220px 1fr; gap: 16px; }
        .sidebar { display: flex; flex-direction: column; gap: 10px; }
        .sidebar-section { background: var(--container-bg); border: 1px solid var(--border-color); border-radius: var(--radius-lg); padding: 12px; }
        .sidebar-title { font-size: 11px; font-weight: 600; color: var(--text-sub); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 8px; }
        .search-input { width: 100%; padding: 6px 10px; font-size: 13px; background: var(--list-bg); color: var(--text-main); border: 1px solid var(--border-color); border-radius: 6px; margin-bottom: 8px; font-family: var(--font-sans); }
        .cost-filter-row { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 8px; }
        .cost-pill { padding: 3px 10px; border: 1px solid var(--border-color); border-radius: 99px; font-size: 11px; cursor: pointer; background: var(--bg-color); color: var(--text-sub); transition: 0.15s; }
        .cost-pill.active { background: var(--accent-bg); color: var(--accent-color); border-color: var(--accent-color); }
        .char-list { display: flex; flex-direction: column; gap: 3px; max-height: 500px; overflow-y: auto; }
        .char-item { padding: 7px 10px; border-radius: 6px; cursor: pointer; font-size: 13px; display: flex; align-items: center; justify-content: space-between; transition: background 0.1s; color: var(--text-main); }
        .char-item:hover { background: var(--section-bg); }
        .char-item.active { background: var(--accent-bg); color: var(--accent-color); font-weight: 600; }
        .char-item .has-data { font-size: 9px; color: var(--accent-color); margin-left: 4px; }
        .char-cost-badge { font-size: 10px; padding: 1px 6px; border-radius: 99px; background: var(--section-bg); color: var(--text-sub); }
        .main-panel { min-width: 0; }
        .tab-bar { display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; }
        .tab { padding: 5px 16px; border: 1px solid var(--border-color); border-radius: 99px; font-size: 13px; cursor: pointer; background: var(--container-bg); color: var(--text-sub); transition: 0.15s; font-family: var(--font-sans); }
        .tab.active { background: var(--info-bg); color: var(--info-text); border-color: var(--info-border); font-weight: 600; }
        .panel { background: var(--container-bg); border: 1px solid var(--border-color); border-radius: var(--radius-lg); padding: 16px; }
        .panel-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
        .panel-title { font-size: 18px; font-weight: 700; }
        .tbl-wrap { overflow-x: auto; margin-bottom: 12px; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th { text-align: left; font-size: 11px; font-weight: 600; color: var(--text-sub); padding: 6px 8px; border-bottom: 1px solid var(--border-color); cursor: pointer; white-space: nowrap; user-select: none; }
        th:hover { color: var(--text-main); }
        th.sorted { color: var(--accent-color); }
        td { padding: 7px 8px; border-bottom: 1px solid var(--list-bg); vertical-align: middle; }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: var(--section-bg); }
        tr.editing td { background: var(--edit-bg) !important; }
        tr.editing td input, tr.editing td select { width: 100%; padding: 3px 6px; font-size: 12px; background: var(--list-bg); color: var(--text-main); border: 1px solid var(--accent-color); border-radius: 4px; font-family: var(--font-sans); }
        .badge-f { font-size: 11px; padding: 2px 7px; border-radius: 99px; background: rgba(255,100,50,0.15); color: #ff8060; font-family: var(--font-mono); }
        .hb-strong { font-size: 11px; padding: 2px 8px; border-radius: 99px; background: rgba(0,200,120,0.15); color: #00c878; }
        .hb-normal { font-size: 11px; padding: 2px 8px; border-radius: 99px; background: var(--section-bg); color: var(--text-sub); }
        .hb-weak   { font-size: 11px; padding: 2px 8px; border-radius: 99px; background: rgba(255,80,80,0.12); color: #ff6060; }
        .mono { font-family: var(--font-mono); font-size: 12px; background: var(--section-bg); padding: 2px 6px; border-radius: 4px; color: var(--text-sub); }
        .bar-wrap { display: flex; align-items: center; gap: 6px; }
        .bar-bg { flex: 1; height: 5px; background: var(--section-bg); border-radius: 3px; overflow: hidden; min-width: 40px; }
        .bar-fill { height: 100%; border-radius: 3px; background: var(--accent-color); }
        .dmg-val { font-size: 13px; font-weight: 600; min-width: 28px; }
        .btn-icon { background: none; border: none; cursor: pointer; font-size: 13px; padding: 2px 4px; color: var(--text-sub); transition: color 0.1s; }
        .btn-icon:hover { color: var(--accent-color); }
        .btn-icon.del:hover { color: var(--danger-text); }
        .btn-icon.confirm { color: var(--accent-color); font-size: 15px; }
        .btn-icon.cancel  { color: var(--text-sub); }
        .add-row { display: grid; grid-template-columns: 1.4fr 1fr .7fr .7fr .7fr 1fr auto; gap: 6px; align-items: center; padding-top: 10px; border-top: 1px solid var(--border-color); }
        .add-row input, .add-row select { padding: 5px 8px; font-size: 12px; background: var(--list-bg); color: var(--text-main); border: 1px solid var(--border-color); border-radius: 6px; font-family: var(--font-sans); }
        .btn-sm { padding: 5px 10px; font-size: 12px; font-weight: 600; background: var(--accent-color); color: var(--btn-text); border: none; border-radius: 6px; cursor: pointer; white-space: nowrap; font-family: var(--font-sans); }
        .combo-item { display: grid; grid-template-columns: 1fr auto auto auto; gap: 8px; align-items: center; padding: 8px 6px; border-bottom: 1px solid var(--list-bg); border-radius: 4px; cursor: pointer; transition: background 0.1s; }
        .combo-item:last-child { border-bottom: none; }
        .combo-item:hover { background: var(--section-bg); }
        .combo-item.editing { background: var(--edit-bg) !important; cursor: default; }
        .combo-item.editing input { width: 100%; padding: 3px 6px; font-size: 12px; background: var(--list-bg); color: var(--text-main); border: 1px solid var(--accent-color); border-radius: 4px; font-family: var(--font-sans); }
        .combo-input-text { font-family: var(--font-mono); font-size: 12px; color: var(--text-sub); }
        .combo-meta { font-size: 12px; color: var(--text-sub); white-space: nowrap; }
        .add-combo-row { display: grid; grid-template-columns: 2fr .8fr 1.5fr auto; gap: 6px; align-items: center; padding-top: 10px; border-top: 1px solid var(--border-color); }
        .add-combo-row input { padding: 5px 8px; font-size: 12px; background: var(--list-bg); color: var(--text-main); border: 1px solid var(--border-color); border-radius: 6px; font-family: var(--font-sans); }
        .memo-area { width: 100%; min-height: 120px; padding: 10px; background: var(--list-bg); color: var(--text-main); border: 1px solid var(--border-color); border-radius: 8px; font-size: 13px; font-family: var(--font-sans); resize: vertical; }
        .hint { font-size: 11px; color: var(--text-sub); margin-top: 5px; }
        .empty { text-align: center; padding: 2rem; color: var(--text-sub); font-size: 14px; }
        .no-select { text-align: center; padding: 3rem; color: var(--text-sub); font-size: 14px; }

        /* ステータスパネル */
        .status-panel { display: flex; gap: 20px; align-items: flex-start; flex-wrap: wrap; }
        .status-img-wrap { flex-shrink: 0; }
        .status-img {
            width: 140px; height: 140px; border-radius: 10px;
            border: 2px solid var(--accent-color); object-fit: cover;
            background: var(--list-bg);
        }
        .status-fields { flex: 1; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; min-width: 240px; }
        .status-field label { display: block; font-size: 11px; font-weight: 600; color: var(--text-sub); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 4px; }
        .status-field input {
            width: 100%; padding: 7px 10px; font-size: 14px;
            background: var(--list-bg); color: var(--text-main);
            border: 1px solid var(--border-color); border-radius: 6px;
            font-family: var(--font-sans); transition: border-color 0.15s;
        }
        .status-field input:focus { outline: none; border-color: var(--accent-color); }
        .status-save-btn { margin-top: 16px; }

        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 200; align-items: center; justify-content: center; }
        .modal-overlay.open { display: flex; }
        .modal { background: var(--container-bg); border: 1px solid var(--border-color); border-radius: var(--radius-lg); padding: 20px; width: 90%; max-width: 500px; }
        .modal h3 { font-size: 16px; margin-bottom: 8px; color: var(--accent-color); }
        .modal p { font-size: 12px; color: var(--text-sub); margin-bottom: 12px; }
        .modal textarea { width: 100%; height: 180px; padding: 8px; background: var(--list-bg); color: var(--text-main); border: 1px solid var(--border-color); border-radius: 6px; font-family: var(--font-mono); font-size: 11px; resize: vertical; margin-bottom: 10px; }
        .modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
        .btn-cancel { padding: 6px 14px; font-size: 13px; background: none; color: var(--text-sub); border: 1px solid var(--border-color); border-radius: 6px; cursor: pointer; font-family: var(--font-sans); }
        .save-indicator { font-size: 11px; color: var(--text-sub); transition: color 0.3s; }
        .save-indicator.saved { color: #00c878; }
        @media (max-width: 700px) {
            .layout { grid-template-columns: 1fr; }
            .add-row { grid-template-columns: 1fr 1fr; }
            .add-combo-row { grid-template-columns: 1fr 1fr; }
            .status-fields { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="top-bar">
    <div class="top-bar-left">
        <a class="back-link" href="../">← トップへ戻る</a>
        <span class="page-title">技データベース</span>
        <span class="edit-badge">EDIT</span>
    </div>
    <div class="top-bar-right">
        <span class="save-indicator" id="save-indicator">●  自動保存</span>
        <div class="theme-switcher">
            <button class="btn-theme" onclick="setTheme('dark')"   id="t-dark">ダーク</button>
            <button class="btn-theme" onclick="setTheme('light')"  id="t-light">ライト</button>
            <button class="btn-theme" onclick="setTheme('custom')" id="t-custom">クリーム</button>
        </div>
    </div>
</div>

<div class="export-bar">
    <div class="export-bar-text">
        <strong>📤 エクスポート</strong>　編集が終わったら movedata.js をダウンロードして database/ フォルダに追加してください
    </div>
    <div class="export-bar-actions">
        <button class="btn-import" onclick="openImportModal()">📥 インポート</button>
        <button class="btn-export" onclick="exportJS()">movedata.js をダウンロード</button>
    </div>
</div>

<div class="layout">
    <div class="sidebar">
        <div class="sidebar-section">
            <div class="sidebar-title">キャラクター</div>
            <input type="text" class="search-input" id="char-search" placeholder="キャラ名で絞り込み..." oninput="renderCharList()">
            <div class="cost-filter-row">
                <div class="cost-pill active" onclick="setCostFilter(this, '')">全て</div>
                <div class="cost-pill" onclick="setCostFilter(this,'3.0')">3.0</div>
                <div class="cost-pill" onclick="setCostFilter(this,'2.5')">2.5</div>
                <div class="cost-pill" onclick="setCostFilter(this,'2.0')">2.0</div>
                <div class="cost-pill" onclick="setCostFilter(this,'1.5')">1.5</div>
            </div>
            <div class="char-list" id="char-list"></div>
        </div>
    </div>

    <div class="main-panel">
        <div class="tab-bar">
            <button class="tab active" id="tab-status" onclick="switchTab('status')">ステータス</button>
            <button class="tab"        id="tab-moves"  onclick="switchTab('moves')">技一覧</button>
            <button class="tab"        id="tab-combos" onclick="switchTab('combos')">コンボ</button>
            <button class="tab"        id="tab-memo"   onclick="switchTab('memo')">メモ</button>
        </div>
        <div id="view-status" class="panel"><div id="status-content"></div></div>
        <div id="view-moves"  class="panel" style="display:none"><div id="moves-content"></div></div>
        <div id="view-combos" class="panel" style="display:none"><div id="combos-content"></div></div>
        <div id="view-memo"   class="panel" style="display:none"><div id="memo-content"></div></div>
    </div>
</div>

<div class="modal-overlay" id="import-modal">
    <div class="modal">
        <h3>📥 movedata.js をインポート</h3>
        <p>既存の movedata.js の内容を貼り付けてください。現在の編集内容は上書きされます。</p>
        <textarea id="import-text" placeholder="const MOVE_DATA = [ ... ];"></textarea>
        <div class="modal-actions">
            <button class="btn-cancel" onclick="closeImportModal()">キャンセル</button>
            <button class="btn-sm" onclick="doImport()">インポート実行</button>
        </div>
    </div>
</div>

<script src="../characters.js"></script>
<script>
const THEME_KEY   = 'starward_theme';
const DB_KEY      = 'starward_movedb_edit';
const HB_ORDER    = { 強:0, 普通:1, 弱:2 };
const IMAGE_BASE  = 'https://raw.githubusercontent.com/Ala-Aster/Starward_tools/main/image';

const DEFAULT_STATUS = { hp: 0, boostCount: 0, boostDist: 0, lockDist: 0 };

let chars = CHARACTER_DATA.map(c => ({
    id: c.cost + '_' + c.id,
    name: c.name,
    cost: c.cost,
    status: { ...DEFAULT_STATUS },
    moves: [], combos: [], memo: ''
}));

let selId = null, activeTab = 'status', sortKey = null, sortAsc = true, costFilter = '';
let editingMoveIdx = -1, editingComboIdx = -1;

// ---- LocalStorage ----
function saveDB() {
    localStorage.setItem(DB_KEY, JSON.stringify(chars));
    flashSaved();
}
function loadDB() {
    const raw = localStorage.getItem(DB_KEY);
    if (!raw) return;
    try {
        const saved = JSON.parse(raw);
        chars = CHARACTER_DATA.map(c => {
            const key = c.cost + '_' + c.id;
            const found = saved.find(s => s.id === key);
            return found
                ? { ...found, name: c.name, cost: c.cost, status: { ...DEFAULT_STATUS, ...(found.status||{}) } }
                : { id: key, name: c.name, cost: c.cost, status: { ...DEFAULT_STATUS }, moves: [], combos: [], memo: '' };
        });
    } catch(e) { console.error(e); }
}
function flashSaved() {
    const el = document.getElementById('save-indicator');
    el.textContent = '✓  保存済み'; el.classList.add('saved');
    clearTimeout(el._t);
    el._t = setTimeout(() => { el.textContent = '●  自動保存'; el.classList.remove('saved'); }, 2000);
}

// ---- エクスポート ----
function exportJS() {
    const data = chars.filter(c => {
        const s = c.status;
        return c.moves.length > 0 || c.combos.length > 0 || c.memo.trim()
            || s.hp || s.boostCount || s.boostDist || s.lockDist;
    });
    const lines = data.map(c => {
        const movesStr  = JSON.stringify(c.moves,  null, 4).split('\n').map((l,i)=>i===0?l:'    '+l).join('\n');
        const combosStr = JSON.stringify(c.combos, null, 4).split('\n').map((l,i)=>i===0?l:'    '+l).join('\n');
        const statusStr = JSON.stringify(c.status);
        return `  {\n    id: ${JSON.stringify(c.id)},\n    status: ${statusStr},\n    moves: ${movesStr},\n    combos: ${combosStr},\n    memo: ${JSON.stringify(c.memo)}\n  }`;
    });
    const content = `// ============================================================\n//  movedata.js — 星之翼 技データベース\n// ============================================================\n\nconst MOVE_DATA = [\n${lines.join(',\n')}\n];\n`;
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([content], { type: 'text/javascript' }));
    a.download = 'movedata.js'; a.click();
    URL.revokeObjectURL(a.href);
}

// ---- インポート ----
function openImportModal()  { document.getElementById('import-modal').classList.add('open'); document.getElementById('import-text').value = ''; }
function closeImportModal() { document.getElementById('import-modal').classList.remove('open'); }
function doImport() {
    const text = document.getElementById('import-text').value.trim();
    try {
        const match = text.match(/const\s+MOVE_DATA\s*=\s*(\[[\s\S]*?\])\s*;/);
        if (!match) throw new Error('形式が正しくありません');
        const data = JSON.parse(match[1]);
        data.forEach(d => {
            const c = chars.find(x => x.id === d.id);
            if (c) {
                c.status = { ...DEFAULT_STATUS, ...(d.status||{}) };
                c.moves  = d.moves  || [];
                c.combos = d.combos || [];
                c.memo   = d.memo   || '';
            }
        });
        saveDB(); renderCharList(); renderActiveTab(); closeImportModal();
    } catch(e) { alert('インポートに失敗しました。\n' + e.message); }
}

// ---- テーマ ----
function setTheme(name) {
    if (name === 'dark') document.documentElement.removeAttribute('data-theme');
    else document.documentElement.setAttribute('data-theme', name);
    localStorage.setItem(THEME_KEY, name);
    document.querySelectorAll('.btn-theme').forEach(b => b.classList.remove('active'));
    document.getElementById('t-' + name)?.classList.add('active');
}

// ---- キャラリスト ----
function setCostFilter(el, val) {
    costFilter = val;
    document.querySelectorAll('.cost-pill').forEach(p => p.classList.remove('active'));
    el.classList.add('active'); renderCharList();
}
function renderCharList() {
    const q = document.getElementById('char-search').value.toLowerCase();
    const list = chars.filter(c => c.name.toLowerCase().includes(q) && (!costFilter || c.cost === costFilter));
    document.getElementById('char-list').innerHTML = list.map(c => {
        const hasData = c.moves.length > 0 || c.combos.length > 0 || c.memo.trim()
            || c.status.hp || c.status.boostCount || c.status.boostDist || c.status.lockDist;
        return `<div class="char-item${selId===c.id?' active':''}" onclick="selectChar('${c.id}')">
            <span>${c.name}${hasData?'<span class="has-data">●</span>':''}</span>
            <span class="char-cost-badge">${c.cost}</span>
        </div>`;
    }).join('');
}
function selectChar(id) {
    selId = id; sortKey = null; editingMoveIdx = -1; editingComboIdx = -1;
    renderCharList(); renderActiveTab();
}

// ---- タブ ----
function switchTab(tab) {
    activeTab = tab; editingMoveIdx = -1; editingComboIdx = -1;
    ['status','moves','combos','memo'].forEach(t => {
        document.getElementById('view-'+t).style.display = t===tab?'block':'none';
        document.getElementById('tab-'+t).classList.toggle('active', t===tab);
    });
    renderActiveTab();
}
function renderActiveTab() {
    if      (activeTab==='status') renderStatus();
    else if (activeTab==='moves')  renderMoves();
    else if (activeTab==='combos') renderCombos();
    else if (activeTab==='memo')   renderMemo();
}

// ---- ステータス ----
function getChar() { return chars.find(x => x.id === selId); }

function renderStatus() {
    const el = document.getElementById('status-content');
    const c = getChar();
    if (!c) { el.innerHTML = '<div class="no-select">左のリストからキャラクターを選択してください</div>'; return; }

    const s = c.status;
    // 画像URL: cost/id.png
    const charData = CHARACTER_DATA.find(x => c.cost + '_' + x.id === c.id && x.cost === c.cost);
    const imgUrl = charData ? `${IMAGE_BASE}/${c.cost}/${charData.id}.png` : '';

    el.innerHTML = `
        <div class="panel-header">
            <span class="panel-title">${c.name} <span style="font-size:13px;font-weight:400;color:var(--text-sub)">コスト ${c.cost}</span></span>
        </div>
        <div class="status-panel">
            <div class="status-img-wrap">
                <img class="status-img" src="${imgUrl}" alt="${c.name}" onerror="this.style.opacity='0.3'">
            </div>
            <div class="status-fields">
                <div class="status-field">
                    <label>HP</label>
                    <input type="number" id="st-hp" value="${s.hp||''}" placeholder="例: 620" min="0">
                </div>
                <div class="status-field">
                    <label>ブースト回数</label>
                    <input type="number" id="st-boostCount" value="${s.boostCount||''}" placeholder="例: 3" min="0">
                </div>
                <div class="status-field">
                    <label>ブースト距離</label>
                    <input type="number" id="st-boostDist" value="${s.boostDist||''}" placeholder="例: 70" min="0">
                </div>
                <div class="status-field">
                    <label>ロック距離</label>
                    <input type="number" id="st-lockDist" value="${s.lockDist||''}" placeholder="例: 200" min="0">
                </div>
            </div>
        </div>
        <div class="status-save-btn">
            <button class="btn-sm" onclick="saveStatus()">保存</button>
        </div>
        <p class="hint" style="margin-top:6px">変更後は「保存」を押してください</p>`;
}

function saveStatus() {
    const c = getChar();
    if (!c) return;
    c.status = {
        hp:         parseInt(document.getElementById('st-hp').value)         || 0,
        boostCount: parseInt(document.getElementById('st-boostCount').value) || 0,
        boostDist:  parseInt(document.getElementById('st-boostDist').value)  || 0,
        lockDist:   parseInt(document.getElementById('st-lockDist').value)   || 0,
    };
    saveDB(); renderCharList();
}

// ---- 技一覧 ----
function renderMoves() {
    const el = document.getElementById('moves-content');
    const c = getChar();
    if (!c) { el.innerHTML = '<div class="no-select">左のリストからキャラクターを選択してください</div>'; return; }
    let moves = [...c.moves];
    if (sortKey) {
        moves.sort((a, b) => {
            let av=a[sortKey], bv=b[sortKey];
            if (sortKey==='hitbox') { av=HB_ORDER[av]; bv=HB_ORDER[bv]; }
            if (sortKey==='startup'||sortKey==='dmg') { av=+av||0; bv=+bv||0; }
            return sortAsc?(av<bv?-1:av>bv?1:0):(av>bv?-1:av<bv?1:0);
        });
    }
    const mx = moves.length ? Math.max(...moves.map(m=>m.dmg),1) : 1;
    const sa = key => key===sortKey?(sortAsc?' ↑':' ↓'):' ↕';
    const th = key => `onclick="doSort('${key}')"`;
    const rows = c.moves.map((m, ri) => {
        if (ri === editingMoveIdx) {
            return `<tr class="editing">
                <td><input id="em-name"    value="${esc(m.name)}"></td>
                <td><input id="em-input"   value="${esc(m.input)}"></td>
                <td><input id="em-startup" type="number" value="${m.startup}" style="width:60px"></td>
                <td><select id="em-hitbox">
                    <option value="強"   ${m.hitbox==='強'?'selected':''}>強</option>
                    <option value="普通" ${m.hitbox==='普通'?'selected':''}>普通</option>
                    <option value="弱"   ${m.hitbox==='弱'?'selected':''}>弱</option>
                </select></td>
                <td><input id="em-dmg"  type="number" value="${m.dmg}"  style="width:70px"></td>
                <td><input id="em-note" value="${esc(m.note||'')}"></td>
                <td style="white-space:nowrap">
                    <button class="btn-icon confirm" onclick="confirmEditMove(${ri})" title="確定">✓</button>
                    <button class="btn-icon cancel"  onclick="cancelEditMove()"       title="キャンセル">✕</button>
                </td>
            </tr>`;
        }
        return `<tr onclick="startEditMove(${ri})" style="cursor:pointer">
            <td style="font-weight:600">${esc(m.name)}</td>
            <td><span class="mono">${esc(m.input)}</span></td>
            <td><span class="badge-f">${m.startup}F</span></td>
            <td><span class="${m.hitbox==='強'?'hb-strong':m.hitbox==='弱'?'hb-weak':'hb-normal'}">${m.hitbox}</span></td>
            <td><div class="bar-wrap"><div class="bar-bg"><div class="bar-fill" style="width:${Math.round(m.dmg/mx*100)}%"></div></div><span class="dmg-val">${m.dmg}</span></div></td>
            <td style="font-size:12px;color:var(--text-sub)">${esc(m.note||'')}</td>
            <td><button class="btn-icon del" onclick="delMove(event,${ri})">🗑</button></td>
        </tr>`;
    }).join('');
    el.innerHTML = `
        <div class="panel-header">
            <span class="panel-title">${c.name} <span style="font-size:13px;font-weight:400;color:var(--text-sub)">コスト ${c.cost}</span></span>
        </div>
        <p class="hint" style="margin-bottom:8px">行をクリックして編集</p>
        <div class="tbl-wrap"><table>
            <thead><tr>
                <th ${th('name')}    class="${sortKey==='name'?'sorted':''}">技名${sa('name')}</th>
                <th ${th('input')}   class="${sortKey==='input'?'sorted':''}">入力${sa('input')}</th>
                <th ${th('startup')} class="${sortKey==='startup'?'sorted':''}">発生${sa('startup')}</th>
                <th ${th('hitbox')}  class="${sortKey==='hitbox'?'sorted':''}">判定${sa('hitbox')}</th>
                <th ${th('dmg')}     class="${sortKey==='dmg'?'sorted':''}">ダメージ${sa('dmg')}</th>
                <th>備考</th><th></th>
            </tr></thead>
            <tbody>${rows||'<tr><td colspan="7" class="empty">技が登録されていません</td></tr>'}</tbody>
        </table></div>
        <div class="add-row">
            <input type="text"   id="m-name"    placeholder="技名">
            <input type="text"   id="m-input"   placeholder="入力 例:格闘">
            <input type="number" id="m-startup" placeholder="発生F" min="1">
            <select id="m-hitbox"><option value="強">強</option><option value="普通" selected>普通</option><option value="弱">弱</option></select>
            <input type="number" id="m-dmg"     placeholder="ダメ">
            <input type="text"   id="m-note"    placeholder="備考">
            <button class="btn-sm" onclick="addMove()">＋ 追加</button>
        </div>`;
}
function startEditMove(idx)  { editingMoveIdx = idx; renderMoves(); document.getElementById('em-name')?.focus(); }
function cancelEditMove()    { editingMoveIdx = -1;  renderMoves(); }
function confirmEditMove(idx) {
    const c = getChar();
    c.moves[idx] = {
        name:    document.getElementById('em-name').value.trim()    || c.moves[idx].name,
        input:   document.getElementById('em-input').value.trim()   || '—',
        startup: parseInt(document.getElementById('em-startup').value) || 0,
        hitbox:  document.getElementById('em-hitbox').value,
        dmg:     parseInt(document.getElementById('em-dmg').value)  || 0,
        note:    document.getElementById('em-note').value.trim()
    };
    editingMoveIdx = -1; saveDB(); renderMoves(); renderCharList();
}
function doSort(key) { if (sortKey===key) sortAsc=!sortAsc; else { sortKey=key; sortAsc=true; } renderMoves(); }
function addMove() {
    const c = getChar();
    const name = document.getElementById('m-name').value.trim();
    if (!name) return;
    c.moves.push({ name, input: document.getElementById('m-input').value.trim()||'—', startup: parseInt(document.getElementById('m-startup').value)||0, hitbox: document.getElementById('m-hitbox').value, dmg: parseInt(document.getElementById('m-dmg').value)||0, note: document.getElementById('m-note').value.trim() });
    saveDB(); renderMoves(); renderCharList();
}
function delMove(e, idx) { e.stopPropagation(); getChar().moves.splice(idx,1); if(editingMoveIdx===idx) editingMoveIdx=-1; saveDB(); renderMoves(); renderCharList(); }

// ---- コンボ ----
function renderCombos() {
    const el = document.getElementById('combos-content');
    const c = getChar();
    if (!c) { el.innerHTML = '<div class="no-select">左のリストからキャラクターを選択してください</div>'; return; }
    const items = c.combos.map((co, i) => {
        if (i === editingComboIdx) {
            return `<div class="combo-item editing">
                <input id="ec-input" value="${esc(co.input)}" placeholder="コンボ入力">
                <input id="ec-dmg"   value="${co.dmg}" type="number" style="width:70px" placeholder="ダメ">
                <input id="ec-note"  value="${esc(co.note||'')}" placeholder="備考">
                <span style="white-space:nowrap">
                    <button class="btn-icon confirm" onclick="confirmEditCombo(${i})" title="確定">✓</button>
                    <button class="btn-icon cancel"  onclick="cancelEditCombo()"      title="キャンセル">✕</button>
                </span>
            </div>`;
        }
        return `<div class="combo-item" onclick="startEditCombo(${i})">
            <span class="combo-input-text">${esc(co.input)}</span>
            <span class="combo-meta">ダメ: <strong>${co.dmg}</strong></span>
            <span class="combo-meta" style="font-style:italic">${esc(co.note||'')}</span>
            <button class="btn-icon del" onclick="delCombo(event,${i})">🗑</button>
        </div>`;
    }).join('');
    el.innerHTML = `
        <div class="panel-header"><span class="panel-title">${c.name} — コンボ</span></div>
        <p class="hint" style="margin-bottom:8px">行をクリックして編集</p>
        ${items||'<div class="empty">コンボが登録されていません</div>'}
        <div class="add-combo-row">
            <input type="text"   id="co-input" placeholder="コンボ入力 例: 格闘→格闘→BA">
            <input type="number" id="co-dmg"   placeholder="合計ダメ">
            <input type="text"   id="co-note"  placeholder="備考">
            <button class="btn-sm" onclick="addCombo()">＋ 追加</button>
        </div>`;
}
function startEditCombo(idx) { editingComboIdx = idx; renderCombos(); document.getElementById('ec-input')?.focus(); }
function cancelEditCombo()   { editingComboIdx = -1;  renderCombos(); }
function confirmEditCombo(idx) {
    const c = getChar();
    c.combos[idx] = { input: document.getElementById('ec-input').value.trim()||c.combos[idx].input, dmg: parseInt(document.getElementById('ec-dmg').value)||0, note: document.getElementById('ec-note').value.trim() };
    editingComboIdx = -1; saveDB(); renderCombos(); renderCharList();
}
function addCombo() {
    const c = getChar();
    const input = document.getElementById('co-input').value.trim();
    if (!input) return;
    c.combos.push({ input, dmg: parseInt(document.getElementById('co-dmg').value)||0, note: document.getElementById('co-note').value.trim() });
    saveDB(); renderCombos(); renderCharList();
}
function delCombo(e, idx) { e.stopPropagation(); getChar().combos.splice(idx,1); if(editingComboIdx===idx) editingComboIdx=-1; saveDB(); renderCombos(); renderCharList(); }

// ---- メモ ----
function renderMemo() {
    const el = document.getElementById('memo-content');
    const c = getChar();
    if (!c) { el.innerHTML = '<div class="no-select">左のリストからキャラクターを選択してください</div>'; return; }
    el.innerHTML = `
        <div class="panel-header"><span class="panel-title">${c.name} — 攻略メモ</span></div>
        <textarea class="memo-area" oninput="saveMemo(this.value)">${c.memo||''}</textarea>
        <p class="hint">自動保存されます</p>`;
}
function saveMemo(val) { const c=getChar(); if(c){c.memo=val; saveDB(); renderCharList();} }

function esc(str) { return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

window.onload = function() {
    setTheme(localStorage.getItem(THEME_KEY) || 'dark');
    loadDB(); renderCharList(); renderActiveTab();
};
</script>
</body>
</html>
